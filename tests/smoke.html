<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Nicky's Hiking Pal smoke tests</title>
<style>body{font:14px monospace;padding:20px}iframe{width:1200px;height:800px;border:1px solid #ccc}pre{white-space:pre-wrap}.pass{color:#176b45}.fail{color:#b3261e}</style>
<h1>Smoke tests</h1>
<pre id="results">Running...</pre>
<iframe id="app" src="../index.html"></iframe>
<script>
const results=[], out=document.querySelector("#results"), frame=document.querySelector("#app");
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const waitFor=async(fn,timeout=10000)=>{const start=Date.now();while(Date.now()-start<timeout){if(fn())return true;await wait(100)}return false};
const assert=(name,value)=>{results.push(`${value?"PASS":"FAIL"} ${name}`);if(!value)throw Error(name)};
frame.addEventListener("load",async()=>{
  try{
    await wait(2500);
    const w=frame.contentWindow,d=frame.contentDocument;
    assert("personalized default greeting",d.querySelector("#pageTitle").textContent.includes("Sahib"));
    assert("time-aware greeting",/Good morning|Good afternoon|Good evening/.test(d.querySelector("#pageTitle").textContent));
    assert("weather card exists",!!d.querySelector("#weatherPanel"));
    assert("weather request resolves or fails gracefully",!d.querySelector("#weatherCondition").textContent.includes("Choose your location"));
    const startingJournal=w.getAppData();w.applyCloudData({hikes:[],plans:[],bucket:[],goals:startingJournal.goals,settings:startingJournal.settings,meta:startingJournal.meta});
    d.querySelector('[data-period="year"]').click();
    assert("zero distance has an accurate empty explanation",d.querySelector("#distanceStat").textContent.includes("0.0")&&d.querySelector("#distanceContext").textContent.includes("No miles logged"));
    assert("zero elevation has an accurate empty explanation",d.querySelector("#elevationStat").textContent.includes("0")&&d.querySelector("#elevationContext").textContent.includes("No elevation logged"));
    assert("zero hikes have an accurate empty explanation",d.querySelector("#hikesStat").textContent.includes("0")&&d.querySelector("#hikesContext").textContent.includes("No completed hikes"));
    assert("zero seconds have an accurate empty explanation",d.querySelector("#timeStat").textContent.includes("0s")&&d.querySelector("#timeContext").textContent.includes("No trail time logged"));
    w.applyCloudData(startingJournal);
    d.querySelector("#cloudBtn").click();assert("cloud settings dialog opens",d.querySelector("#cloudDialog").open);assert("unconfigured cloud keeps local mode clear",!d.querySelector("#cloudUnavailable").classList.contains("hidden"));d.querySelector("[data-close-cloud]").click();
    d.querySelector('[data-open-modal="completed"]').click();
    assert("log dialog opens",d.querySelector("#entryDialog").open);
    d.querySelector('[data-close-entry]').click();
    assert("cancel closes log dialog",!d.querySelector("#entryDialog").open);
    d.querySelector('[data-open-modal="completed"]').click();
    d.querySelector("#entryName").value="Automated Test Trail";
    d.querySelector("#entryLocation").value="Test Range, WA";
    d.querySelector("#entryDistance").value="6.2";
    assert("elevation accepts single-foot increments",d.querySelector("#entryElevation").step==="1");
    d.querySelector("#entryElevation").value="1585";
    d.querySelector("#entryHighest").value="3247";
    d.querySelector("#entryTrailhead").value="47.61010, -122.20150";
    d.querySelector("#entryDurationHours").value="5";
    d.querySelector("#entryDurationMinutes").value="12";
    d.querySelector("#entryDurationSeconds").value="34";
    d.querySelector("#entryForm").requestSubmit();
    await wait(200);
    assert("manual hike saves",d.body.textContent.includes("Automated Test Trail"));
    const manual=w.getAppData().hikes.find(h=>h.name==="Automated Test Trail");
    assert("exact elevation is retained",manual.elevation===1585&&manual.highest===3247);
    assert("duration is retained to the second",manual.durationSeconds===18754);
    assert("saved hike gains map coordinates automatically",manual.lat===47.6101&&manual.lng===-122.2015);
    d.querySelector("#sheetImportBtn").click();
    assert("spreadsheet dialog opens",d.querySelector("#spreadsheetDialog").open);
    assert("spreadsheet reader loads",await waitFor(()=>!!w.XLSX));
    const csv='Hike Name,Date Completed,Location,Distance,Elevation Gain,Duration,Difficulty,Personal Rating,Notes,Tags\nMailbox Peak,2025-08-12,"North Bend, WA",9.4,"4,005",07:31:22,Hard,5,Excellent training day,"mountain; strenuous"\nTwin Falls,2025-04-05,"North Bend, WA",2.6,503,1.5,Easy,4,Great waterfall hike,"waterfall; forest"';
    const dt=new DataTransfer();dt.items.add(new File([csv],"history.csv",{type:"text/csv"}));d.querySelector("#spreadsheetInput").files=dt.files;d.querySelector("#spreadsheetInput").dispatchEvent(new Event("change",{bubbles:true}));
    await waitFor(()=>!d.querySelector("#mappingStep").classList.contains("hidden"));
    assert("spreadsheet rows recognized",d.querySelector("#importSummary").textContent.includes("2 rows"));
    assert("spreadsheet name auto-mapped",d.querySelector('[data-map-field="name"]').value==="Hike Name");
    d.querySelector("#confirmImportBtn").click();
    await wait(200);
    assert("spreadsheet hike imported",d.body.textContent.includes("Mailbox Peak"));
    const mailbox=w.getAppData().hikes.find(h=>h.name==="Mailbox Peak");
    assert("spreadsheet H:MM:SS duration imports accurately",mailbox.durationSeconds===27082);
    assert("spreadsheet exact elevation imports accurately",mailbox.elevation===4005);
    const importedCount=d.querySelectorAll(".library-item").length;
    d.querySelector("#sheetImportBtn").click();d.querySelector("#spreadsheetInput").files=dt.files;d.querySelector("#spreadsheetInput").dispatchEvent(new Event("change",{bubbles:true}));await waitFor(()=>!d.querySelector("#mappingStep").classList.contains("hidden"));d.querySelector("#confirmImportBtn").click();await wait(150);
    assert("duplicate spreadsheet rows are skipped",d.querySelectorAll(".library-item").length===importedCount);
    d.querySelector("[data-close-sheet]")?.click();
    d.querySelector('[data-view="dashboard"]').click();d.querySelector('[data-period="lifetime"]').click();
    assert("lifetime stats include imported history",parseFloat(d.querySelector("#distanceStat").textContent)>40);
    assert("overview explanations update with selected period data",!d.querySelector("#elevationContext").textContent.includes("No elevation logged")&&!d.querySelector("#timeContext").textContent.includes("No trail time logged"));
    const lifetimeJournal=w.getAppData(),lifetimeElevation=lifetimeJournal.hikes.reduce((n,h)=>n+(+h.elevation||0),0),lifetimeSeconds=lifetimeJournal.hikes.reduce((n,h)=>n+(+h.durationSeconds||0),0);
    assert("overview elevation comparison is calculated from displayed data",d.querySelector("#elevationContext").textContent.includes((lifetimeElevation/1454).toFixed(1)));
    assert("overview outdoor-time comparison is calculated from displayed data",d.querySelector("#timeContext").textContent.includes(lifetimeSeconds/86400<1?(lifetimeSeconds/3600).toFixed(1):(lifetimeSeconds/86400).toFixed(1)));
    assert("monthly chart is data-driven",d.querySelectorAll("#monthlyChart>div").length===6);
    d.querySelector('[data-view="hikes"]').click();
    d.querySelector("#hikeSearch").value="Mailbox";d.querySelector("#hikeSearch").dispatchEvent(new Event("input",{bubbles:true}));
    assert("hike search filters results",d.querySelectorAll(".library-item").length===1&&d.body.textContent.includes("Mailbox Peak"));
    d.querySelector(".library-item[data-detail]").click();assert("hike detail opens",d.querySelector("#detailDialog").open);
    assert("hike detail shows readable precise duration",d.querySelector("#detailStats").textContent.includes("7h 31m 22s"));
    d.querySelector("[data-close-detail]").click();assert("hike detail closes",!d.querySelector("#detailDialog").open);
    d.querySelector("#hikeSearch").value="";d.querySelector("#hikeSearch").dispatchEvent(new Event("input",{bubbles:true}));
    const mapJournal=w.getAppData(),lake=mapJournal.hikes.find(h=>h.name==="Lake 22");Object.assign(lake,{lat:35.75,lng:-79.02,mapSource:"OpenStreetMap",mapConfirmed:false});
    mapJournal.settings.geocodeCache["lake 22, granite falls, wa"]=[{name:"Lake 22 Trail",display_name:"Lake 22 Trail, Mountain Loop Highway, Washington",lat:"48.077",lon:"-121.773",osm_type:"way",osm_id:21}];
    [...mapJournal.hikes,...mapJournal.plans,...mapJournal.bucket].filter(x=>x!==lake&&!x.lat&&!x.route?.length).forEach(x=>x.mapLookupAttemptedAt="2026-01-01T00:00:00.000Z");
    mapJournal.plans[0].route=[{lat:47.445,lng:-121.424},{lat:47.449,lng:-121.418}];w.applyCloudData(mapJournal);
    d.querySelector('[data-view="map"]').click();await wait(500);assert("interactive map initializes",!!d.querySelector("#map.leaflet-container"));
    assert("newly saved hike has a visible named map indicator",!!d.querySelector('#map [data-marker-name="Automated Test Trail"]'));
    assert("old automatic map guesses are visibly unconfirmed",d.querySelector("#mapItemFilters").textContent.includes("Unconfirmed"));
    d.querySelector('[data-edit-map-location="hikes:3"]').click();assert("location editor opens from trail map",d.querySelector("#locationDialog").open);
    d.querySelector("#locationSearchBtn").click();await wait(100);d.querySelector("[data-location-result]").click();d.querySelector("#locationForm").requestSubmit();await wait(100);
    const corrected=w.getAppData().hikes.find(h=>h.name==="Lake 22");assert("place search corrects Lake 22 to Washington",corrected.lat===48.077&&corrected.lng===-121.773&&corrected.mapConfirmed===true);
    d.querySelector('[data-edit-map-location="hikes:3"]').click();d.querySelector("#locationCoordinatesInput").value="https://www.google.com/maps/@48.078500,-121.776500,15z";d.querySelector("#useLocationCoordinatesBtn").click();d.querySelector("#locationForm").requestSubmit();await wait(100);
    const googleCorrected=w.getAppData().hikes.find(h=>h.name==="Lake 22");assert("Google Maps URL coordinates set the marker",googleCorrected.lat===48.0785&&googleCorrected.lng===-121.7765);
    assert("confirmed correction replaces unconfirmed warning",!d.querySelector("#mapItemFilters").textContent.includes("Unconfirmed"));
    d.querySelector('#map [data-marker-name="Lake 22"]').click();await wait(100);assert("clicking a map marker offers location editing",!!d.querySelector(".popup-edit-location"));d.querySelector(".popup-edit-location").click();assert("marker popup edit action opens location editor",d.querySelector("#locationDialog").open);d.querySelector("[data-close-location]").click();
    d.querySelector(".map-item-row[data-edit-map-location='hikes:3']").click();assert("clicking a saved trail row opens location editing",d.querySelector("#locationDialog").open);d.querySelector("[data-close-location]").click();
    assert("GPX route renders start and end indicators",d.querySelectorAll('#map [data-marker-name="Snow Lake"]').length===2&&d.querySelectorAll("#map .leaflet-interactive").length>=1);
    assert("map has individual hike controls",d.querySelectorAll("[data-map-item]").length===w.getAppData().hikes.length+w.getAppData().plans.length+w.getAppData().bucket.length);
    d.querySelector("#mapSearch").value="Automated Test Trail";d.querySelector("#mapSearch").dispatchEvent(new Event("input",{bubbles:true}));assert("map search filters saved hike controls",d.querySelectorAll("[data-map-item]").length===1);
    d.querySelector("#mapSearch").value="";d.querySelector("#mapSearch").dispatchEvent(new Event("input",{bubbles:true}));
    d.querySelector("#mapClearAll").click();assert("map can hide every saved hike",d.querySelectorAll("#map .leaflet-marker-icon").length===0);
    d.querySelector("#mapShowAll").click();assert("map can restore saved hikes",d.querySelectorAll("#map .leaflet-marker-icon").length>=1);
    const formJournal=w.getAppData(),formLake=formJournal.hikes.find(h=>h.name==="Lake 22");formJournal.settings.geocodeCache["lake 22 trailhead washington"]=[{name:"Lake 22 Trailhead",display_name:"Lake 22 Trailhead, Mountain Loop Highway, Washington",lat:"48.0779",lon:"-121.7761",osm_type:"node",osm_id:31}];w.applyCloudData(formJournal);
    d.querySelector('[data-view="hikes"]').click();d.querySelector('[data-detail="3"]').click();d.querySelector("#editHikeBtn").click();d.querySelector("#entryLocation").value="Lake 22 Trailhead Washington";d.querySelector("#entryLocation").dispatchEvent(new Event("input",{bubbles:true}));
    assert("changing form location clears stale coordinates",!d.querySelector("#entryLat").value&&!d.querySelector("#entryLng").value);
    d.querySelector("#entryLocation").value="https://www.google.com/maps/@48.080100,-121.780200,15z";d.querySelector("#entryLocation").dispatchEvent(new Event("input",{bubbles:true}));d.querySelector("#entryLocationSearchBtn").click();assert("form accepts Google Maps URL coordinates",d.querySelector("#entryLat").value==="48.0801"&&d.querySelector("#entryLng").value==="-121.7802");
    d.querySelector("#entryLocation").value="Lake 22 Trailhead Washington";d.querySelector("#entryLocation").dispatchEvent(new Event("input",{bubbles:true}));
    d.querySelector("#entryLocationSearchBtn").click();await wait(100);d.querySelector("[data-entry-location-result]").click();assert("form location search selection stores map coordinates",d.querySelector("#entryLat").value==="48.0779"&&d.querySelector("#entryLocation").value.includes("Washington"));d.querySelector("#entryForm").requestSubmit();await wait(150);
    const formCorrected=w.getAppData().hikes.find(h=>h.name==="Lake 22");assert("saving edited location replaces old map marker",formCorrected.lat===48.0779&&formCorrected.lng===-121.7761&&formCorrected.mapConfirmed===true);
    d.querySelector('[data-view="plans"]').click();assert("plans navigation",d.querySelector("#plansView").classList.contains("active"));
    d.querySelector('[data-open-modal="planned"]').click();assert("planned hike dialog opens",d.querySelector("#entryDialog").open);assert("online trail lookup appears for plans",!d.querySelector("#trailLookup").classList.contains("hidden"));assert("unknown plan distance can be left blank",!d.querySelector("#entryDistance").required);
    w.applyTrailResult({name:"Source Trail",display_name:"Source Trail, Test Park, WA",lat:"47.5",lon:"-121.5",osm_type:"way",osm_id:99,extratags:{distance:"10 km",ascent:"500 m",ele:"1200 m",sac_scale:"demanding_mountain_hiking",route:"hiking"}});
    assert("online source fills available route stats",d.querySelector("#entryDistance").value==="6.2"&&d.querySelector("#entryElevation").value==="1640"&&d.querySelector("#entryDifficulty").value==="Hard");
    d.querySelector('[data-close-entry]').click();assert("planned hike cancel works",!d.querySelector("#entryDialog").open);
    d.querySelector('[data-view="insights"]').click();assert("insights navigation",d.querySelector("#insightsView").classList.contains("active"));
    const comparisons=d.querySelector("#comparisonGrid").textContent;d.querySelector("#shuffleInsightsBtn").click();assert("insight comparisons rotate",d.querySelector("#comparisonGrid").textContent!==comparisons);
    assert("backup restore is explained",d.querySelector(".backup-explainer").textContent.includes("replaces this browser"));
    d.querySelector("#profileSettingsBtn").click();assert("profile and goals editor opens",d.querySelector("#settingsDialog").open);
    d.querySelector("#displayNameInput").value="Trail Tester";d.querySelector("#goalDistanceInput").value="222";d.querySelector("#settingsDarkMode").checked=true;d.querySelector("#settingsForm").requestSubmit();await wait(100);
    assert("display name customizes profile",d.querySelector("#profileName").textContent==="Trail Tester");
    d.querySelector('[data-view="dashboard"]').click();assert("display name customizes greeting",d.querySelector("#pageTitle").textContent.includes("Trail Tester"));
    assert("annual distance goal is editable",w.getAppData().goals.distance===222);
    assert("dark mode applies across the app",d.documentElement.classList.contains("dark"));
    const darkButton=w.getComputedStyle(d.querySelector(".secondary-button"));assert("dark mode buttons retain contrast",darkButton.color!==darkButton.backgroundColor);
    frame.style.width="390px";await wait(250);
    assert("mobile navigation visible",w.getComputedStyle(d.querySelector(".mobile-nav")).display==="grid");
    assert("mobile layout has no horizontal overflow",d.documentElement.scrollWidth<=d.documentElement.clientWidth+1);
  }catch(error){results.push(`FAIL ${error.message}`)}
  out.textContent=results.join("\n");out.className=results.some(x=>x.startsWith("FAIL"))?"fail":"pass";document.title=results.some(x=>x.startsWith("FAIL"))?"FAIL":"PASS";
});
</script>
</html>
